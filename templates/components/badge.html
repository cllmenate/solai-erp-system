<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border transition-all duration-200
             {% if variant == 'success' %}
                 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800
             {% elif variant == 'warning' %}
                 bg-amber-50 dark:bg-amber-950/30 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-800
             {% elif variant == 'danger' %}
                 bg-rose-50 dark:bg-rose-950/30 text-rose-700 dark:text-rose-400 border-rose-200 dark:border-rose-800
             {% elif variant == 'info' %}
                 bg-sky-50 dark:bg-sky-950/30 text-sky-700 dark:text-sky-400 border-sky-200 dark:border-sky-800
             {% else %}
                 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700
             {% endif %}
             {{ custom_classes }}">
    {{ label }}
</span>
