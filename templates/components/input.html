<div class="flex flex-col gap-1.5 w-full {{ wrapper_classes }}">
    {% if label %}
        <label {% if id %}for="{{ id }}"{% endif %} class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
            {{ label }} {% if required %}<span class="text-rose-500">*</span>{% endif %}
        </label>
    {% endif %}
    <div class="relative flex items-center">
        <input type="{{ type|default:'text' }}"
               name="{{ name }}"
               {% if id %}id="{{ id }}"{% endif %}
               {% if value %}value="{{ value }}"{% endif %}
               {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
               class="w-full px-4 py-3 bg-slate-100/60 dark:bg-slate-900/60 border {% if error %}border-rose-500 focus:border-rose-500 focus:ring-rose-500/20{% else %}border-slate-200 dark:border-slate-800 focus:border-brand-500 focus:ring-brand-500/20{% endif %} rounded-xl text-sm text-slate-900 dark:text-slate-100 transition-all duration-200 focus:outline-none focus:ring-4 {% if disabled %}opacity-50 cursor-not-allowed bg-slate-50 dark:bg-slate-950{% endif %} {{ custom_classes }}"
               {% if required %}required{% endif %}
               {% if disabled %}disabled{% endif %}
               {{ extra_attrs|safe }}>
    </div>
    {% if error %}
        <span class="text-xs text-rose-500 animate-slide-up">{{ error }}</span>
    {% elif help_text %}
        <span class="text-xs text-slate-400 dark:text-slate-500">{{ help_text }}</span>
    {% endif %}
</div>
