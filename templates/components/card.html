<div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 transform hover:-translate-y-0.5 {{ custom_classes }}">
    {% if title or subtitle or card_header %}
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 {{ header_classes }}">
            {% if card_header %}
                {{ card_header|safe }}
            {% else %}
                {% if title %}
                    <h3 class="text-base font-bold font-outfit text-slate-800 dark:text-slate-100">{{ title }}</h3>
                {% endif %}
                {% if subtitle %}
                    <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">{{ subtitle }}</p>
                {% endif %}
            {% endif %}
        </div>
    {% endif %}
    <div class="p-6 {{ body_classes }}">
        {{ card_body|safe }}
    </div>
    {% if card_footer %}
        <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-800/60 bg-slate-50/50 dark:bg-slate-900/30 rounded-b-2xl {{ footer_classes }}">
            {{ card_footer|safe }}
        </div>
    {% endif %}
</div>
