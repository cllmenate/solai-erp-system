<div id="{{ id }}" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-x-hidden overflow-y-auto hidden">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="document.getElementById('{{ id }}').classList.add('hidden')"></div>
    
    <!-- Modal Dialog -->
    <div class="relative bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 rounded-2xl shadow-xl w-full 
               {% if size == 'sm' %}max-w-sm{% elif size == 'lg' %}max-w-lg{% elif size == 'xl' %}max-w-xl{% elif size == '2xl' %}max-w-2xl{% else %}max-w-md{% endif %}
               transform transition-all duration-300 animate-scale-in flex flex-col {{ custom_classes }}">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800/60">
            <h3 class="text-base font-bold font-outfit text-slate-900 dark:text-slate-100">{{ title }}</h3>
            <button type="button" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors focus:outline-none" onclick="document.getElementById('{{ id }}').classList.add('hidden')">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <!-- Body -->
        <div class="p-6 overflow-y-auto flex-1">
            {{ modal_body|safe }}
        </div>
        <!-- Footer -->
        {% if modal_footer %}
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-100 dark:border-slate-800/60 bg-slate-50/50 dark:bg-slate-900/30 rounded-b-2xl">
                {{ modal_footer|safe }}
            </div>
        {% endif %}
    </div>
</div>
