<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SolAI ERP — Sistema SaaS B2B Multi-Tenant Inteligente">
    <meta property="og:title" content="SolAI ERP">
    <meta property="og:description" content="SolAI ERP — Sistema SaaS B2B Multi-Tenant Inteligente">
    <title>{% block title %}SolAI ERP{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff5f0',
                            100: '#ffe6d5',
                            500: '#ff4a00',
                            600: '#e04100',
                            700: '#b83200',
                            900: '#7c1c00',
                        }
                    }
                }
            }
        }
    </script>
    {% include "components/tokens.html" %}
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased selection:bg-brand-500/30 selection:text-white">
    {% block content %}
    {% endblock %}
</body>
</html>
