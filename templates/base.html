<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SolAI ERP — Sistema SaaS B2B Multi-Tenant Inteligente">
    <meta property="og:title" content="SolAI ERP">
    <meta property="og:description" content="SolAI ERP — Sistema SaaS B2B Multi-Tenant Inteligente">
    <title>{% block title %}SolAI ERP{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0c10;
            --text: #f5f5f7;
            --accent: #ff4a00;
            --accent-hover: #e04100;
            --accent-glow: rgba(255, 74, 0, 0.15);
            --border: #2c2f33;
            --card-bg: #16181d;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--accent-hover);
        }

        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 2rem;
        }

        .auth-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .auth-card:hover {
            border-color: var(--accent);
        }

        .auth-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -0.05em;
        }

        .auth-logo span {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
        }

        .form-control {
            background: #0f1015;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .btn-primary {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.9rem;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .alert-messages {
            margin-bottom: 1.5rem;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            border: 1px solid transparent;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #f87171;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border-color: #22c55e;
            color: #4ade80;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
