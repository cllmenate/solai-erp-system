<div class="address-row bg-slate-50/50 dark:bg-slate-950/20 p-6 border border-slate-200/80 dark:border-slate-800/80 rounded-2xl relative space-y-4 animate-slide-up">
    <div class="flex justify-between items-center border-b border-slate-200/80 dark:border-slate-800/80 pb-2">
        <span class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Endereço</span>
        <button type="button" onclick="this.closest('.address-row').remove()" class="inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-slate-900 bg-transparent border border-rose-200 dark:border-rose-800 hover:bg-rose-50 dark:hover:bg-rose-950/20 text-rose-600 dark:text-rose-400 focus:ring-rose-500 px-3 py-1.5 text-xs cursor-pointer active:scale-95">
            Remover Endereço
        </button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Label -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Rótulo (ex: Matriz, Filial SP) *</label>
            <input type="text" name="address_label[]" value="{{ address.label }}" required placeholder="Matriz"
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- CEP -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">CEP *</label>
            <input type="text" name="address_zip_code[]" value="{{ address.zip_code }}" required placeholder="00000-000"
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Logradouro -->
        <div class="space-y-2 lg:col-span-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Logradouro *</label>
            <input type="text" name="address_street[]" value="{{ address.street }}" required 
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Numero -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Número *</label>
            <input type="text" name="address_number[]" value="{{ address.number }}" required 
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Complemento -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Complemento</label>
            <input type="text" name="address_complement[]" value="{{ address.complement|default:'' }}" 
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Bairro -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Bairro *</label>
            <input type="text" name="address_neighborhood[]" value="{{ address.neighborhood }}" required 
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Cidade -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Cidade *</label>
            <input type="text" name="address_city[]" value="{{ address.city }}" required 
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- State -->
        <div class="space-y-2">
            <label class="block text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">UF *</label>
            <input type="text" name="address_state[]" value="{{ address.state }}" required max="2" placeholder="UF"
                   class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200">
        </div>

        <!-- Flags -->
        <div class="flex items-center space-x-6 lg:col-span-3 h-[44px] pb-1">
            <label class="inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" name="address_is_collection[]" value="{{ index }}" class="w-4 h-4 text-brand-600 focus:ring-brand-500/20 border-slate-200 dark:border-slate-800 rounded-md bg-white dark:bg-slate-900 focus:ring-2" {% if address.is_collection %}checked{% endif %}>
                <span class="ml-2 text-xs text-slate-700 dark:text-slate-300 font-medium">Usar para Coleta</span>
            </label>
            <label class="inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" name="address_is_delivery[]" value="{{ index }}" class="w-4 h-4 text-brand-600 focus:ring-brand-500/20 border-slate-200 dark:border-slate-800 rounded-md bg-white dark:bg-slate-900 focus:ring-2" {% if address.is_delivery %}checked{% endif %}>
                <span class="ml-2 text-xs text-slate-700 dark:text-slate-300 font-medium">Usar para Entrega</span>
            </label>
        </div>
    </div>
</div>
