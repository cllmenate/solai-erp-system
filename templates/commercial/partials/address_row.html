<div class="address-row bg-slate-50 p-6 border border-slate-200 rounded-sm relative space-y-4">
    <div class="flex justify-between items-center border-b border-slate-200 pb-2">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Endereço</span>
        <button type="button" onclick="this.closest('.address-row').remove()" class="text-rose-600 hover:text-rose-800 text-xs font-semibold py-1 px-2.5 border border-rose-200 rounded-sm hover:bg-rose-50 transition-all cursor-pointer">
            Remover Endereço
        </button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Label -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Rótulo (ex: Matriz, Filial SP) *</label>
            <input type="text" name="address_label[]" value="{{ address.label }}" required placeholder="Matriz"
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- CEP -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">CEP *</label>
            <input type="text" name="address_zip_code[]" value="{{ address.zip_code }}" required placeholder="00000-000"
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Logradouro -->
        <div class="space-y-1 lg:col-span-2">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Logradouro *</label>
            <input type="text" name="address_street[]" value="{{ address.street }}" required 
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Numero -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Número *</label>
            <input type="text" name="address_number[]" value="{{ address.number }}" required 
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Complemento -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Complemento</label>
            <input type="text" name="address_complement[]" value="{{ address.complement|default:'' }}" 
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Bairro -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Bairro *</label>
            <input type="text" name="address_neighborhood[]" value="{{ address.neighborhood }}" required 
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Cidade -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">Cidade *</label>
            <input type="text" name="address_city[]" value="{{ address.city }}" required 
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- State -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide">UF *</label>
            <input type="text" name="address_state[]" value="{{ address.state }}" required max="2" placeholder="SP"
                   class="w-full px-3 py-1.5 border border-slate-300 rounded-sm text-sm focus:outline-none focus:border-brand-500 bg-white text-slate-800">
        </div>

        <!-- Flags -->
        <div class="flex items-center space-x-6 lg:col-span-3 h-[38px] pb-1">
            <label class="inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" name="address_is_collection[]" value="{{ index }}" class="w-4 h-4 text-brand-600 border-slate-300 rounded-sm focus:ring-brand-500" {% if address.is_collection %}checked{% endif %}>
                <span class="ml-2 text-xs text-slate-600 font-medium">Usar para Coleta</span>
            </label>
            <label class="inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" name="address_is_delivery[]" value="{{ index }}" class="w-4 h-4 text-brand-600 border-slate-300 rounded-sm focus:ring-brand-500" {% if address.is_delivery %}checked{% endif %}>
                <span class="ml-2 text-xs text-slate-600 font-medium">Usar para Entrega</span>
            </label>
        </div>
    </div>
</div>
